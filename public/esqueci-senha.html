<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarCard - Esqueci minha senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --purple-deep: #0f0620;
            --purple-mid: #6b21a8;
            --purple-bright: #a855f7;
            --purple-glow: #c084fc;
            --white: #ffffff;
            --white-dim: rgba(255,255,255,0.5);
            --white-faint: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--purple-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(168,85,247,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168,85,247,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--purple-mid), var(--purple-bright));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .brand-name {
            font-size: 16px; font-weight: 800;
            color: var(--white); letter-spacing: -0.3px;
        }
        .icon-wrap {
            width: 52px; height: 52px;
            background: rgba(168,85,247,0.12);
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 22px; font-weight: 700;
            color: var(--white); letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px; color: var(--white-dim);
            line-height: 1.6; margin-bottom: 28px;
        }
        .field-label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--white-dim); text-transform: uppercase;
            letter-spacing: 0.8px; margin-bottom: 8px;
        }
        .field-input {
            width: 100%;
            background: var(--white-faint);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--white);
            outline: none;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.2); }
        .field-input:focus {
            border-color: var(--purple-bright);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.12);
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--purple-mid), var(--purple-bright));
            border: none; border-radius: 10px;
            padding: 13px; font-size: 14px;
            font-family: 'Inter', sans-serif; font-weight: 600;
            color: var(--white); cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(168,85,247,0.35); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert {
            border-radius: 10px; padding: 12px 14px;
            font-size: 13px; margin-bottom: 16px; display: none;
        }
        .alert-success {
            background: rgba(74,222,128,0.1);
            border: 1px solid rgba(74,222,128,0.2);
            color: #86efac; display: block;
        }
        .alert-danger {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5; display: block;
        }
        .back-link {
            display: block; text-align: center;
            margin-top: 24px; font-size: 13px;
            color: var(--white-dim); text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--purple-glow); }
        .spinner {
            display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-icon">🚀</div>
            <span class="brand-name">starcard Afiliados</span>
        </div>

        <div class="icon-wrap">🔑</div>
        <h1>Esqueci minha senha</h1>
        <p>Informe seu e-mail cadastrado e enviaremos um link para você redefinir sua senha.</p>

        <div class="alert" id="alertBox"></div>

        <form id="form">
            <label class="field-label" for="email">E-mail</label>
            <input type="email" class="field-input" id="email" name="email" placeholder="seu@email.com.br" required>
            <button type="submit" class="btn" id="btn">
                <span id="btnText">Enviar link de redefinição</span>
            </button>
        </form>

        <a href="/login" class="back-link">← Voltar para o login</a>
    </div>

    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btnText');
            const alertBox = document.getElementById('alertBox');

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Enviando...';
            alertBox.className = 'alert';

            try {
                const response = await fetch('/api/esqueci-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });

                const result = await response.json();

                if (result.sucesso) {
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = 'Link enviado! Verifique seu e-mail.';
                    document.getElementById('form').style.display = 'none';
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = result.erro || 'Erro ao enviar e-mail.';
                }
            } catch {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Erro de conexão. Tente novamente.';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Enviar link de redefinição';
            }
        });
    </script>
</body>
</html>
