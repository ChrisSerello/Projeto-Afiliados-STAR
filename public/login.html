<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <title>Starcard — Portal de Afiliados</title>
    <link rel="icon" type="image/png" href="assets/Planeta.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            background: #060410;
        }

        /* Camadas de profundidade do fundo */
        .depth-1 {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 100% 100% at 0% 100%, #000 0%, transparent 55%),
                radial-gradient(ellipse 100% 100% at 100% 0%, #000 0%, transparent 55%);
        }
        .depth-2 {
            position: fixed; inset: 0; z-index: 1;
            background:
                radial-gradient(ellipse 80% 80% at 25% 20%, #7c3aed 0%, transparent 55%),
                radial-gradient(ellipse 60% 60% at 75% 15%, #9333ea 0%, transparent 45%),
                radial-gradient(ellipse 70% 60% at 50% 60%, #4c1d95 0%, transparent 60%);
            opacity: 0.55;
        }
        .depth-3 {
            position: fixed; inset: 0; z-index: 2;
            background:
                radial-gradient(ellipse 50% 40% at 30% 20%, #a855f7 0%, transparent 50%),
                radial-gradient(ellipse 30% 30% at 65% 10%, #c084fc 0%, transparent 45%);
            opacity: 0.28;
        }
        .depth-4 {
            position: fixed; inset: 0; z-index: 3;
            background:
                radial-gradient(ellipse 70% 50% at 50% 120%, #000 0%, transparent 65%),
                radial-gradient(ellipse 30% 90% at -5% 50%, #000 0%, transparent 50%),
                radial-gradient(ellipse 30% 90% at 105% 50%, #000 0%, transparent 50%);
            opacity: 0.75;
        }

        /* S de fundo */
        .bg-watermark {
            position: fixed;
            bottom: -140px; left: -80px;
            font-size: 700px;
            font-weight: 900;
            color: rgba(168,85,247,0.05);
            line-height: 1;
            pointer-events: none;
            user-select: none;
            z-index: 4;
        }

        /* Card */
        .card {
            position: relative; z-index: 10;
            width: 100%; max-width: 860px;
            min-height: 490px;
            display: flex;
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.07),
                0 60px 120px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* ── PAINEL ESQUERDO ── */
        .left {
            flex: 1;
            padding: 44px 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            background: linear-gradient(
                155deg,
                #9333ea 0%,
                #7c3aed 20%,
                #5b21b6 45%,
                #3b0f8a 70%,
                #100530 100%
            );
        }

        .left::before {
            content: '';
            position: absolute;
            top: -60px; left: -60px;
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(216,180,254,0.3) 0%, transparent 65%);
            pointer-events: none;
        }

        /* Divisor sutil entre os dois lados */
        .left::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 1px; height: 100%;
            background: linear-gradient(
                to bottom,
                transparent,
                rgba(216,180,254,0.25) 30%,
                rgba(196,141,252,0.25) 70%,
                transparent
            );
        }

        .left-logo {
            height: 28px; width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.88;
            position: relative; z-index: 1;
        }

        .left-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* text-align: right; */
            padding: 20px 0;
            position: relative; z-index: 1;
        }

        .left-brand-name {
            font-size: clamp(46px, 5vw, 68px);
            font-weight: 900;
            color: #fff;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 4px 40px rgba(0,0,0,0.3);
            font-family: "Funnel Display", sans-serif;
            font-optical-sizing: auto;
            font-weight: weight;
            font-style: normal;
        }

        .left-by {
            font-size: 18px;
            /* text-align: left; */
            color: rgba(255,255,255,0.45);
            font-weight: 300;
            letter-spacing: 1px;
        }
        .left-by b {
            font-weight: 800;
            color: rgba(255,255,255,0.75);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-style: italic;
        }

        /* ── PAINEL DIREITO — roxo escuro ── */
        .right {
            width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 40px;
            position: relative;
            background: linear-gradient(
                155deg,
                #3b0f8a 0%,
                #2a0a6e 35%,
                #16053a 70%,
                #060210 100%
            );
        }

        /* Brilho sutil no canto superior direito */
        .right::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, transparent 65%);
            pointer-events: none;
        }

        .right-logo {
            height: 90px; width: auto;
            margin-bottom: 20px;
            margin-left: 30px;
            filter: brightness(0) invert(1);
            opacity: 0.85;
            position: relative; z-index: 1;
        }

        .right-title {
            font-size: 22px; font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
            text-align: center;
            position: relative; z-index: 1;
        }
        .right-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 28px;
            text-align: center;
            position: relative; z-index: 1;
        }

        /* Inputs no tema escuro */
        .field { width: 100%; margin-bottom: 12px; position: relative; z-index: 1; }

        .input-wrap {
            display: flex; align-items: center;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 9px;
            padding: 0 14px;
            background: rgba(255,255,255,0.07);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .input-wrap:focus-within {
            border-color: rgba(196,141,252,0.6);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
        }
        .input-icon { font-size: 14px; opacity: 0.45; margin-right: 10px; flex-shrink: 0; }

        .inp {
            flex: 1; border: none; outline: none;
            padding: 12px 0;
            font-size: 14px; font-family: 'Inter', sans-serif;
            color: #fff; background: transparent;
        }
        .inp::placeholder { color: rgba(255,255,255,0.3); }

        .row-forgot {
            width: 100%; display: flex;
            justify-content: flex-end; margin-bottom: 20px;
            position: relative; z-index: 1;
        }
        .forgot {
            font-size: 12px; font-weight: 600;
            color: rgba(216,180,254,0.8);
            text-decoration: none; transition: opacity 0.2s;
        }
        .forgot:hover { opacity: 0.7; }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #a855f7, #c084fc);
            border: none; border-radius: 10px; padding: 13px;
            font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 700;
            color: #fff; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
            position: relative; z-index: 1;
            box-shadow: 0 4px 20px rgba(168,85,247,0.3);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(168,85,247,0.5); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .alert { width: 100%; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; position: relative; z-index: 1; }
        .alert.err { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }

        .admin-link {
            display: block; margin-top: 20px; font-size: 11px;
            color: rgba(255,255,255,0.2); text-decoration: none; text-align: center;
            transition: color 0.2s; position: relative; z-index: 1;
        }
        .admin-link:hover { color: rgba(216,180,254,0.7); }

        .spin {
            display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: rot 0.7s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes rot { to { transform: rotate(360deg); } }

        @media (max-width: 650px) { .left { display: none; } .right { width: 100%; } .card { max-width: 380px; } }
    </style>
</head>
<body>

    <div class="depth-1"></div>
    <div class="depth-2"></div>
    <div class="depth-3"></div>
    <div class="depth-4"></div>
    <div class="bg-watermark">STAR</div>

    <div class="card">

        <!-- ESQUERDA -->
        <div class="left">
            <!-- <img src="Logo_Starbank.png" alt="StarBank" class="left-logo"> -->
            <div class="left-main">
                <div class="left-brand-name">Afiliados</div>
                <div class="left-by">by <b>STAR</b></div>
            </div>
        </div>

        <!-- DIREITA -->
        <div class="right">
            <img src="assets/Starcard.png" alt="StarBank" class="right-logo">
            <div class="right-title">Bem vindo!</div>
            <div class="right-sub">Portal de afiliados StarCard.</div>

            <div class="alert" id="alertBox"></div>

            <form id="loginForm" style="width:100%">
                <div class="field">
                    <div class="input-wrap">
                        <span class="input-icon">✉️</span>
                        <input type="email" class="inp" name="email" placeholder="Insira seu e-mail" required autocomplete="email">
                    </div>
                </div>
                <div class="field">
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" class="inp" name="senha" placeholder="Insira sua senha" required autocomplete="current-password">
                    </div>
                </div>
                <div class="row-forgot">
                    <a href="/esqueci-senha" class="forgot">Esqueci a senha</a>
                </div>
                <button type="submit" class="btn" id="btn">
                    <span id="btnText">Entrar</span>
                </button>
            </form>

            <a href="/admin" class="admin-link">⚙ Painel Administrativo</a>
        </div>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btnText');
            const alertBox = document.getElementById('alertBox');
            btn.disabled = true;
            btnText.innerHTML = '<span class="spin"></span>Entrando...';
            alertBox.className = 'alert';
            try {
                const res = await fetch('/login', {
                    method: 'POST', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Object.fromEntries(new FormData(e.target)))
                });
                const r = await res.json();
                if (r.sucesso) {
                    btnText.textContent = '✓ Redirecionando...';
                    window.location.href = r.redirect;
                } else {
                    alertBox.className = 'alert err';
                    alertBox.textContent = r.erro || 'Email ou senha incorretos.';
                    btn.disabled = false; btnText.textContent = 'Entrar';
                }
            } catch {
                alertBox.className = 'alert err';
                alertBox.textContent = 'Erro de conexão. Tente novamente.';
                btn.disabled = false; btnText.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
